server:
  port: 8085
  error:
    include-message: always

spring:
  application:
    name: reporting-analytics-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:mysql}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        concurrency: 2
        max-concurrency: 5

smartcampus:
  student-profile:
    base-url: ${STUDENT_PROFILE_BASE_URL:http://localhost:8081}
  course-enrolment:
    base-url: ${COURSE_ENROLMENT_BASE_URL:http://localhost:8082}
  library:
    base-url: ${LIBRARY_BASE_URL:http://localhost:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:reportingdb}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:reporting-db}:${DB_PORT:5432}/${DB_NAME:reporting_db}
    username: ${DB_USER:scc}
    password: ${DB_PASSWORD:scc_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
